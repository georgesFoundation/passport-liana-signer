# appId = ASCII "liana-signer-app" (exactly 16 bytes / 0x + 32 hex).
appId = "0x6c69616e612d7369676e65722d617070"

[appName]
en = "Liana"

[permissions]
template = ["gui-app", "fs-generic"]
"os/security" = ["GetAppSeed"]
# Per-location access grants. fs-generic grants the file *operations*; these grant
# the locations. The export file-picker can save the key/descriptor/signed-PSBT to
# Airlock, internal (User), or SD/USB, and imports are read from any of them — so
# read+write are needed on all three (else "AccessDenied").
"os/fs" = [
    "GetAirlockReadAccess",
    "GetAirlockWriteAccess",
    "GetUserReadAccess",
    "GetUserWriteAccess",
    "GetUsbReadAccess",
    "GetUsbWriteAccess",
]
